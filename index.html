<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "phosphorColor": "#39ff14",
  "bgColor": "#050c07",
  "scanlines": true,
  "binaryRain": true,
  "fishSize": 13
}/*EDITMODE-END*/;

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  ASCII FISH FRAMES  (detailed 11-line betta/guppy)
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  RIGHT: tail fan LEFT  вҶ’вҶ’  head RIGHT   ( В°  )>
//  LEFT:  tail fan RIGHT вҶ’вҶ’  head LEFT   <( В°  )
//  Hand-authored both directions вҖ” no runtime mirroring

// RIGHT-FACING вҖ” 4 frames, tail animation
const FR = [
  // Frame 0 вҖ” neutral
  [
    "  \\",
    "   \\            /\\",
    "    \\           | \\",
    "     \\         /   \\",
    "      \\       /     )",
    "       \\     ( В°   )>",
    "       //     \\____/",
    "      //        | \\",
    "     //         |  \\",
    "    //",
    "   //",
  ],
  // Frame 1 вҖ” tail sweeps up
  [
    " \\",
    "  \\             /\\",
    "   \\            | \\",
    "    \\          /   \\",
    "     \\        /     )",
    "      \\      ( В°   )>",
    "      //      \\____/",
    "     //         | \\",
    "    //          |  \\",
    "   //",
    "  //",
  ],
  // Frame 2 вҖ” neutral + wake ripple
  [
    "  \\",
    "   \\            /\\",
    "    \\           | \\",
    "     \\         /   \\",
    "      \\       /     )",
    "       \\     ( В°   )>~~",
    "       //     \\____/",
    "      //        | \\",
    "     //         |  \\",
    "    //",
    "   //",
  ],
  // Frame 3 вҖ” tail sweeps down
  [
    "  \\",
    "   \\            /\\",
    "    \\           | \\",
    "     \\         /   \\",
    "      \\       /     )",
    "       \\     ( В°   )>",
    "       //     \\____/",
    "      ///       | \\",
    "     ///        |  \\",
    "    ///",
    "   ///",
  ],
].map(lines => lines.join('\n'));

// LEFT-FACING вҖ” hand-authored (head LEFT, tail fan RIGHT)
const FL = [
  // Frame 0 вҖ” neutral
  [
    "              //",
    "   /\\         //",
    "  /  \\       //",
    " /    \\     //",
    "(      \\   //",
    "<( В°    ) //",
    " \\____/ \\\\",
    "  /  |   \\\\",
    " /   |    \\\\",
    "          \\\\",
    "           \\\\",
  ],
  // Frame 1 вҖ” tail sweeps up
  [
    "             //",
    "            //",
    "   /\\      //",
    "  /  \\    //",
    " (    \\  //",
    "<( В°   )//",
    " \\____/\\\\",
    "  /  | \\\\",
    " /   |  \\\\",
    "         \\\\",
    "          \\\\",
  ],
  // Frame 2 вҖ” neutral + wake ripple
  [
    "              //",
    "   /\\         //",
    "  /  \\       //",
    " /    \\     //",

    "  \\____/ \\\\",
    "   /  |   \\\\",

    "           \\\\",
    "            \\\\",
  ],
  // Frame 3 вҖ” tail sweeps down
  [
    "              //",
    "   /\\         //",
    "  /  \\       //",
    " /    \\     //",
    "(      \\   //",
    "<( В°    ) //",
    " \\____/ \\\\",
    "  /  |  ///",
    " /   |  ///",
    "        ///",
    "         ///",
  ],
].map(lines => lines.join('\n'));

// Sleep вҖ” right-facing
const FISH_SLEEP_R = [
  "  \\",
  "   \\            /\\",
  "    \\           | \\",
  "     \\         /   \\",
  "      \\       /     )",
  "       \\     ( -   )>",
  "       //     \\____/",
  "      //",
  "     //   z z z",
  "    //  z",

// Sleep вҖ” left-facing
const FISH_SLEEP_L = [
  "              //",

  "  /  \\       //",
  " /    \\     //",
  "(      \\   //",
  "<( -    ) //",
  " \\____/ \\\\",
  "          \\\\",
  "  z z z   \\\\",
  "      z    \\\\",
  "            \\\\",
].join('\n');

// Eat вҖ” right-facing
const FISH_EAT_R = [
  "  \\          *",
  "   \\            /\\",
  "    \\           | \\",
  "     \\         /   \\",
  "      \\       /     ) *",
  "       \\     ( В°   )> o",
  "       //     \\____/",
  "      //        | \\",
  "     //    *    |  \\",
  "    //",
  "   //",
].join('\n');

// Eat вҖ” left-facing
const FISH_EAT_L = [

  " /    \\     //",
  "(      \\   //",
  " o <( В°  )//",

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  GUPPY SOUL  вҖ” local GuppyLM inference (ONNX + WASM)
//  Falls back to template responses while model loads
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

async function guppyReply(userText, needs) {
  const engine = window.guppyEngine;
  if (engine && engine.ready) {
    const result = await engine.generate(userText, { maxTokens: 45, temperature: 0.85 });
    if (result) return result;
  }
  return window.templateResponse(userText, needs);
}

async function guppyAutoThought(needs) {
  const engine = window.guppyEngine;
  // Build a natural prompt that reflects current needs
  let prompt = 'what are you thinking right now';
  if (needs.hunger < 25)     prompt = 'are you hungry';
  else if (needs.hunger < 45) prompt = 'do you want food';
  else if (needs.happiness < 25) prompt = 'are you lonely';
  else if (needs.energy < 20)    prompt = 'are you tired';
  else {
    const idle = ['do you like bubbles','what do you see','how is the water','tell me about your tank'];
    prompt = idle[Math.floor(Math.random() * idle.length)];
  }

  if (engine && engine.ready) {
    const result = await engine.generate(prompt, { maxTokens: 40, temperature: 0.9 });
    if (result) return result;
  }
  return window.templateResponse(prompt, needs);
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  BINARY RAIN  (background decoration)
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function BinaryRain({ color, enabled }) {
  const [cols, setCols] = useState(() =>
    Array.from({ length: 14 }, (_, i) => ({
      id: i,
      x: 3 + i * 6.8,
      y: Math.random() * 100,
      str: Array.from({ length: 7 }, () => Math.random() > 0.5 ? '1' : '0').join('\n'),
      speed: 0.08 + Math.random() * 0.14,
      opacity: 0.025 + Math.random() * 0.06,
    }))
  );

  useEffect(() => {
    if (!enabled) return;
    const id = setInterval(() => {
      setCols(c => c.map(col => ({
        ...col,
        y: col.y > 100 ? -15 : col.y + col.speed,
        str: Math.random() < 0.06
          ? Array.from({ length: 7 }, () => Math.random() > 0.5 ? '1' : '0').join('\n')
          : col.str,
      })));
    }, 120);
    return () => clearInterval(id);
  }, [enabled]);

  if (!enabled) return null;
  return (
    <>
      {cols.map(col => (
        <pre key={col.id} style={{
          position: 'absolute', left: `${col.x}%`, top: `${col.y}%`,
          color, opacity: col.opacity, fontSize: 10, lineHeight: 1.6,
          pointerEvents: 'none', zIndex: 1,
        }}>{col.str}</pre>
      ))}
    </>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  TANK
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function Tank({ tw, fishX, fishY, fishAscii, bubbles, weedPhase, sleeping, guppySpeech, bgColor }) {
  const ph = tw.phosphorColor;
  const dim = (a = 0.15) => ph.replace(')', `, ${a})`).replace('rgb', 'rgba').replace('#', 'rgba(').replace(/rgba\(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2}), ([0-9.]+)\)/, (_, r,g,b,a) => `rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},${a})`);

  // Build a consistent dim color from phosphor hex
  const hexToDimRgba = (hex, alpha) => {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  };
  const dimPh = (a) => hexToDimRgba(ph, a);

  const weedPositions = [8, 18, 28, 72, 83, 91];
  const weedHeights   = [4,  3,  5,  4,  5,  3];

  const weedChar = (p, wi, hi) => {
    const s = Math.sin(p + wi * 1.1 + hi * 0.25);
    return s > 0.6 ? '(' : s < -0.6 ? ')' : '|';
  };

  return (
    <div style={{ width:'100%', height:'100%', position:'relative', background: bgColor, overflow:'hidden' }}>

      {/* CRT scanline sweep */}
      {tw.scanlines && (
        <div style={{
          position:'absolute', inset:0, pointerEvents:'none', zIndex:30,
          backgroundImage:`repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px)`,
        }}/>
      )}

      {/* Binary rain */}
      <BinaryRain color={ph} enabled={tw.binaryRain} />

      {/* Surface shimmer */}
      <div style={{
        position:'absolute', top:'5%', left:'2%', right:'2%',
        color: dimPh(0.25), fontSize:13, letterSpacing:2, fontFamily:'monospace',
        overflow:'hidden', whiteSpace:'nowrap', pointerEvents:'none',
      }}>
        {Array.from({length:60},(_,i) => ['~','вүҲ','~','~','-','вүҲ','~'][( i + Math.floor(weedPhase*1.5) ) % 7]).join('')}
      </div>

      {/* Bubbles */}
      {bubbles.map(b => (
        <div key={b.id} style={{
          position:'absolute', left:`${b.x}%`, top:`${b.y}%`,
          color: dimPh(0.15 + (1 - b.y/60)*0.25),
          fontSize:12, fontFamily:'monospace',
          transform:`translateX(${Math.sin(b.y * 0.25 + b.id) * 10}px)`,
          pointerEvents:'none', zIndex:4,
        }}>{b.char}</div>
      ))}

      {/* Seaweed вҖ” single 2D ASCII grid, one <pre> block */}
      {(() => {
        const COLS = 88, ROWS = 8;
        const grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(' '));
        weedPositions.forEach((wx, wi) => {
          const baseCol = Math.round(wx * COLS / 100);
          for (let hi = 0; hi < weedHeights[wi]; hi++) {
            const row = ROWS - 1 - hi;
            const sway = Math.round(Math.sin(weedPhase + wi * 1.3 + hi * 0.25) * 1.5);
            const col = Math.max(0, Math.min(COLS - 1, baseCol + sway));
            if (row >= 0) grid[row][col] = weedChar(weedPhase, wi, hi);
          }
        });
        const gridStr = grid.map(r => r.join('')).join('\n');
        return (
          <pre style={{
            position: 'absolute',
            bottom: '8%', left: 0, right: 0,
            fontFamily: 'monospace', fontSize: 13, lineHeight: '13px',
            color: dimPh(0.3),
            pointerEvents: 'none', zIndex: 3,
            margin: 0, padding: '0 4px',
            whiteSpace: 'pre', overflow: 'visible',
          }}>{gridStr}</pre>
        );
      })()}

      {/* Floor */}
      <div style={{
        position:'absolute', bottom:0, left:0, right:0, height:'8%',
        background: dimPh(0.06),
        fontFamily:'monospace', fontSize:12, color: dimPh(0.22),
        overflow:'hidden', display:'flex', alignItems:'center', paddingLeft:6,
        letterSpacing:1,
      }}>
        {'._,_._.,_.~_,._._,__._.~_,._._,.___._,__,_._,._._,._._,_.,_.,_.,.__._,_._._._._._._._._._._._._._._._._.'}
      </div>

      {/* Fish */}
      <div style={{
        position:'absolute',
        left:`${fishX}%`, top:`${fishY}%`,
        transform:'translate(-50%, -50%)',
        fontFamily:'monospace', fontSize: tw.fishSize,
        color: sleeping ? dimPh(0.35) : ph,
        whiteSpace:'pre', lineHeight:1.15,
        textShadow: sleeping ? 'none' : `0 0 12px ${dimPh(0.5)}`,
        transition:'color 1.5s',
        zIndex:6, pointerEvents:'none',
      }}>{fishAscii}</div>

      {/* Sleep Zs */}
      {sleeping && (
        <div style={{
          position:'absolute',
          left:`${fishX + 3}%`, top:`${fishY - 10}%`,
          fontFamily:'monospace', fontSize:12,
          color: dimPh(0.5),
          animation:'zzzFloat 2s ease-out infinite',
          pointerEvents:'none', zIndex:7,
        }}>z z z</div>
      )}

      {/* Speech bubble */}
      {guppySpeech && (
        <div style={{
          position:'absolute',
          left:`${Math.min(Math.max(fishX, 18), 72)}%`,
          top:`${Math.max(fishY - 24, 8)}%`,
          transform:'translateX(-50%)',
          background: bgColor,
          border:`1px solid ${ph}`,
          color: ph,
          padding:'6px 12px',
          fontSize:12, fontFamily:'monospace',
          maxWidth:240, lineHeight:1.5,
          zIndex:20,
          boxShadow:`0 0 16px ${dimPh(0.3)}`,
          animation:'fadeInUp 0.25s ease',
          whiteSpace:'normal',
        }}>
          <div style={{
            position:'absolute', bottom:-8, left:'50%', transform:'translateX(-50%)',
            color: ph, fontSize:10, lineHeight:1,
          }}>в–ј</div>
          {guppySpeech}
        </div>
      )}

      {/* Corner decoration */}
      <div style={{ position:'absolute', top:8, left:8, color: dimPh(0.18), fontSize:10, fontFamily:'monospace', pointerEvents:'none' }}>в”Ңв”Җ</div>
      <div style={{ position:'absolute', top:8, right:8, color: dimPh(0.18), fontSize:10, fontFamily:'monospace', pointerEvents:'none' }}>в”Җв”җ</div>
      <div style={{ position:'absolute', bottom:'9%', left:8, color: dimPh(0.18), fontSize:10, fontFamily:'monospace', pointerEvents:'none' }}>в””в”Җ</div>
      <div style={{ position:'absolute', bottom:'9%', right:8, color: dimPh(0.18), fontSize:10, fontFamily:'monospace', pointerEvents:'none' }}>в”Җв”ҳ</div>
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  STATUS BAR
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function StatBar({ label, value, ph, bgColor }) {
  const filled = Math.round(value / 10);
  const col = value > 60 ? ph : value > 30 ? '#ffc947' : '#ff4d4d';
  return (
    <div style={{ marginBottom:8 }}>
      <div style={{ color:`rgba(${hexR(ph)},${hexG(ph)},${hexB(ph)},0.4)`, fontSize:10, marginBottom:2 }}>{label}</div>
      <div style={{ color:col, fontSize:12, fontFamily:'monospace', letterSpacing:0.5 }}>
        [{`в–Ҳ`.repeat(filled)}{`в–‘`.repeat(10-filled)}] {Math.round(value)}%
      </div>
    </div>
  );
}

const hexR = h => parseInt(h.slice(1,3),16);
const hexG = h => parseInt(h.slice(3,5),16);
const hexB = h => parseInt(h.slice(5,7),16);
const rgba = (h, a) => `rgba(${hexR(h)},${hexG(h)},${hexB(h)},${a})`;

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  TWEAKS PANEL
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function TweaksPanel({ tw, setTw, visible }) {
  if (!visible) return null;
  const update = (k, v) => {
    setTw(prev => { const n = {...prev, [k]:v}; window.parent?.postMessage({type:'__edit_mode_set_keys', edits:n},'*'); return n; });
  };
  const presets = [
    { label:'phosphor', color:'#39ff14' },
    { label:'amber',    color:'#ffb000' },
    { label:'cyan',     color:'#00fff5' },
    { label:'sakura',   color:'#ff7eb3' },
  ];
  return (
    <div style={{
      position:'fixed', bottom:60, right:12, width:200,
      background: tw.bgColor, border:`1px solid ${rgba(tw.phosphorColor,0.4)}`,
      padding:14, fontSize:12, fontFamily:'monospace', color: tw.phosphorColor,
      zIndex:100, boxShadow:`0 0 20px ${rgba(tw.phosphorColor,0.15)}`,
    }}>
      <div style={{ marginBottom:10, opacity:0.6 }}>[ TWEAKS ]</div>

      <div style={{ marginBottom:8, fontSize:11, opacity:0.5 }}>PHOSPHOR COLOR</div>
      <div style={{ display:'flex', gap:6, marginBottom:12, flexWrap:'wrap' }}>
        {presets.map(p => (
          <div key={p.label} onClick={() => update('phosphorColor', p.color)} style={{
            width:24, height:24, background:p.color, cursor:'pointer', borderRadius:2,
            border: tw.phosphorColor === p.color ? '2px solid white' : '2px solid transparent',
          }}/>
        ))}
      </div>

      <div style={{ marginBottom:8, fontSize:11, opacity:0.5 }}>FISH SIZE</div>
      <input type="range" min={11} max={20} value={tw.fishSize} onChange={e => update('fishSize', Number(e.target.value))} style={{ width:'100%', marginBottom:10, accentColor: tw.phosphorColor }}/>

      {[
        { key:'scanlines',   label:'CRT SCANLINES' },
        { key:'binaryRain',  label:'BINARY RAIN' },
      ].map(({ key, label }) => (
        <div key={key} onClick={() => update(key, !tw[key])} style={{ cursor:'pointer', display:'flex', justifyContent:'space-between', marginBottom:6 }}>
          <span style={{ opacity:0.7 }}>{label}</span>
          <span style={{ color: tw[key] ? tw.phosphorColor : rgba(tw.phosphorColor,0.3) }}>{tw[key] ? '[ON]' : '[OFF]'}</span>
        </div>
      ))}
    </div>
  );
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
//  APP
// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function App() {
  const [tw, setTw] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  // Model loading state
  const [modelStatus, setModelStatus] = useState({ pct: 0, msg: 'initializingвҖҰ', done: false, err: false });

  // Tweaks host bridge
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent?.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Fish physics
  const [fishX, setFishX]   = useState(40);
  const [fishDir, setFishDir] = useState(1);
  const [frame, setFrame]   = useState(0);
  const fishDirRef = useRef(1);

  // States
  const [sleeping, setSleeping] = useState(false);
  const [eating, setEating]     = useState(false);
  const sleepingRef = useRef(false);

  // Bubbles
  const [bubbles, setBubbles] = useState([]);
  const bubbleId = useRef(0);
  const fishXRef = useRef(40);
  const fishDRef = useRef(1);

  // Needs
  const [hunger,    setHunger]    = useState(72);
  const [happiness, setHappiness] = useState(85);
  const [energy,    setEnergy]    = useState(90);
  const needsRef = useRef({ hunger:72, happiness:85, energy:90 });

  useEffect(() => { needsRef.current = { hunger, happiness, energy }; }, [hunger, happiness, energy]);

  // Weed phase
  const [weedPhase, setWeedPhase] = useState(0);

  // Chat
  const [messages, setMessages] = useState([]);
  const [input,   setInput]   = useState('');
  const [thinking, setThinking] = useState(false);
  const [speech,  setSpeech]  = useState('');
  const speechTimerRef = useRef(null);
  const busyRef = useRef(false);
  const chatEndRef = useRef(null);

  // scroll chat
  useEffect(() => { chatEndRef.current?.scrollIntoView({ block:'nearest' }); }, [messages, thinking]);

  // в”Җв”Җ Boot GuppyLM engine on mount
  useEffect(() => {
    window.guppyEngine.load((msg, pct) => {
      if (pct === -1) {
        setModelStatus({ pct: 0, msg, done: false, err: true });
      } else if (pct >= 100) {
        setModelStatus({ pct: 100, msg, done: true, err: false });
      } else {
        setModelStatus({ pct, msg, done: false, err: false });
      }
    });
  }, []);

  // в”Җв”Җ Generate greeting on mount
  useEffect(() => {
    (async () => {
      const greeting = await guppyAutoThought({ hunger: 72, happiness: 85, energy: 90 });
      showSpeech(greeting);
      setMessages([{ from:'guppy', text: greeting }]);
    })();
  }, []);

  // в”Җв”Җ Fish movement
  useEffect(() => {
    const id = setInterval(() => {
      if (sleepingRef.current) return;
      setFishX(x => {
        let nx = x + fishDirRef.current * 0.7;
        if (nx > 82) { fishDirRef.current = -1; setFishDir(-1); nx = 82; }
        if (nx < 6)  { fishDirRef.current =  1; setFishDir(1);  nx = 6; }
        fishXRef.current = nx;
        return nx;
      });
    }, 55);
    return () => clearInterval(id);
  }, []);

  // в”Җв”Җ Frame tick
  useEffect(() => {
    const id = setInterval(() => setFrame(f => (f+1) % 4), 200);
    return () => clearInterval(id);
  }, []);

  // в”Җв”Җ Weed sway
  useEffect(() => {
    const id = setInterval(() => setWeedPhase(p => p + 0.07), 70);
    return () => clearInterval(id);
  }, []);

  // в”Җв”Җ Bubble emitter
  useEffect(() => {
    const id = setInterval(() => {
      if (sleepingRef.current) return;
      const bid = bubbleId.current++;
      setBubbles(b => [...b.slice(-25), {
        id: bid,
        x: fishXRef.current + (fishDRef.current > 0 ? 1.5 : -1.5) + (Math.random()*3-1.5),
        y: 55,
        char: ['o','В°','В·','O','.'][Math.floor(Math.random()*5)],
        speed: 0.25 + Math.random() * 0.35,
      }]);
    }, 1600);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    const id = setInterval(() => {
      setBubbles(b => b.map(bb => ({ ...bb, y: bb.y - bb.speed })).filter(bb => bb.y > 4));
    }, 55);
    return () => clearInterval(id);
  }, []);

  // в”Җв”Җ Needs decay
  useEffect(() => {
    const id = setInterval(() => {
      if (sleepingRef.current) {
        setEnergy(e => Math.min(100, e + 1.2));
      } else {
        setHunger(h    => Math.max(0, h    - 0.45));
        setHappiness(hp => Math.max(0, hp - 0.28));
        setEnergy(e    => Math.max(0, e    - 0.18));
      }
    }, 1000);
    return () => clearInterval(id);
  }, []);

  // в”Җв”Җ Auto-thought cycle
  useEffect(() => {
    const id = setInterval(async () => {
      if (busyRef.current || sleepingRef.current) return;
      busyRef.current = true;
      const thought = await guppyAutoThought(needsRef.current);
      showSpeech(thought);
      setMessages(m => [...m, { from:'guppy', text: thought }]);
      busyRef.current = false;
    }, 20000);
    return () => clearInterval(id);
  }, []);

  function showSpeech(text) {
    setSpeech(text);
    if (speechTimerRef.current) clearTimeout(speechTimerRef.current);
    speechTimerRef.current = setTimeout(() => setSpeech(''), 7000);
  }

  // в”Җв”Җ Actions
  async function feed() {
    setHunger(h => Math.min(100, h + 38));
    setEating(true);
    setTimeout(() => setEating(false), 2200);
    if (busyRef.current) return;
    busyRef.current = true;
    const newNeeds = { ...needsRef.current, hunger: Math.min(100, needsRef.current.hunger + 38) };
    const msg = await guppyReply('you dropped food in the water', newNeeds);
    showSpeech(msg);
    setMessages(m => [...m, { from:'guppy', text: msg }]);
    busyRef.current = false;
  }

  async function tap() {
    setHappiness(hp => Math.min(100, hp + 28));
    if (busyRef.current) return;
    busyRef.current = true;
    const msg = await guppyReply('you tapped on the glass', needsRef.current);
    showSpeech(msg);
    setMessages(m => [...m, { from:'guppy', text: msg }]);
    busyRef.current = false;
  }

  async function toggleLight() {
    const wasAsleep = sleepingRef.current;
    sleepingRef.current = !wasAsleep;
    setSleeping(!wasAsleep);
    if (busyRef.current) return;
    busyRef.current = true;
    const trigger = wasAsleep ? 'the light just came back on' : 'the light just turned off';
    const msg = await guppyReply(trigger, needsRef.current);
    showSpeech(msg);
    setMessages(m => [...m, { from:'guppy', text: msg }]);
    busyRef.current = false;
  }

  async function send() {
    const text = input.trim();
    if (!text || thinking || busyRef.current) return;
    setInput('');
    setMessages(m => [...m, { from:'human', text }]);
    setThinking(true);
    busyRef.current = true;
    const reply = await guppyReply(text, needsRef.current);
    showSpeech(reply);
    setMessages(m => [...m, { from:'guppy', text: reply }]);
    setHappiness(hp => Math.min(100, hp + 4));
    setThinking(false);
    busyRef.current = false;
  }

  // в”Җв”Җ Compose fish ASCII
  const fishAscii = sleeping
    ? (fishDir > 0 ? FISH_SLEEP_R : FISH_SLEEP_L)
    : eating
      ? (fishDir > 0 ? FISH_EAT_R  : FISH_EAT_L)
      : (fishDir > 0 ? FR[frame]   : FL[frame]);

  const fishY = sleeping ? 60 : 42;

  const ph  = tw.phosphorColor;
  const bg  = tw.bgColor;
  const dim = (a) => rgba(ph, a);

  const needsLow = hunger < 30 || happiness < 30 || energy < 25;

  return (
    <div style={{
      width:'100%', height:'100%',
      display:'flex', flexDirection:'column',
      fontFamily:"'Share Tech Mono', 'Courier New', monospace",
      background: bg, color: ph,
    }}>
      {/* в”Җв”Җ HEADER */}
      <div style={{
        padding:'5px 14px',
        borderBottom:`1px solid ${dim(0.18)}`,
        display:'flex', justifyContent:'space-between', alignItems:'center',
        flexShrink:0,
      }}>
        <div>
          <span style={{ fontSize:15, letterSpacing:2 }}>GUPPY.EXE</span>
          <span style={{ fontSize:10, color: dim(0.4), marginLeft:10 }}>
            // guppylm-9m В· onnx В·{' '}
            <span style={{ color: modelStatus.err ? '#ff5555' : modelStatus.done ? ph : rgba(ph, 0.5) }}>
              {modelStatus.done ? 'local inference вң“' : modelStatus.err ? 'templates (offline)' : 'loadingвҖҰ'}
            </span>
          </span>
        </div>
        <div style={{ fontSize:10, color: dim(0.35), display:'flex', gap:16 }}>
          {needsLow && <span style={{ color:'#ff4d4d', animation:'blink 1s infinite' }}>вҡ  needs attention</span>}
          <span style={{ cursor:'pointer' }} onClick={() => setTweaksVisible(v => !v)}>[tweaks]</span>
          <span id="clock">{new Date().toLocaleTimeString()}</span>
        </div>
      </div>

      {/* в”Җв”Җ BODY */}
      <div style={{ flex:1, display:'flex', overflow:'hidden', minHeight:0 }}>

        {/* Tank */}
        <div style={{ flex:1, position:'relative', overflow:'hidden', borderRight:`1px solid ${dim(0.15)}` }}>
          <Tank
            tw={tw}
            fishX={fishX} fishY={fishY}
            fishAscii={fishAscii}
            bubbles={bubbles}
            weedPhase={weedPhase}
            sleeping={sleeping}
            guppySpeech={speech}
            bgColor={bg}
          />
          {/* Model loading overlay */}
          {!modelStatus.done && (
            <div style={{
              position:'absolute', bottom:16, left:'50%', transform:'translateX(-50%)',
              background: rgba(bg === '#050c07' ? '#060d0a' : bg, 0.95),
              border:`1px solid ${rgba(ph, 0.3)}`,
              padding:'10px 18px', minWidth:260,
              fontFamily:'monospace', fontSize:11,
              color: modelStatus.err ? '#ff5555' : ph,
              zIndex:50, textAlign:'center',
            }}>
              <div style={{ marginBottom:6, opacity:0.7 }}>
                {modelStatus.err ? 'вҡ  ' : ''}guppylm-9m В· onnx В· wasm
              </div>
              <div style={{ marginBottom:6 }}>{modelStatus.msg}</div>
              {!modelStatus.err && (
                <div style={{
                  height:4, background: rgba(ph, 0.15), borderRadius:2, overflow:'hidden',
                }}>
                  <div style={{
                    height:'100%', width:`${modelStatus.pct}%`,
                    background: ph, borderRadius:2, transition:'width 0.3s ease',
                  }}/>
                </div>
              )}
              {modelStatus.err && (
                <div style={{ marginTop:6, opacity:0.6, fontSize:10 }}>
                  using offline templates вҶ“
                </div>
              )}
            </div>
          )}
        </div>

        {/* Side panel */}
        <div style={{
          width:210, flexShrink:0,
          display:'flex', flexDirection:'column',
          padding:'10px 12px', gap:0,
          overflowY:'auto',
        }}>

          {/* Status */}
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color: dim(0.5), borderBottom:`1px solid ${dim(0.15)}`, paddingBottom:4, marginBottom:8, letterSpacing:1 }}>[ STATUS ]</div>
            <StatBar label="HUNGER"    value={hunger}    ph={ph} bg={bg}/>
            <StatBar label="HAPPINESS" value={happiness} ph={ph} bg={bg}/>
            <StatBar label="ENERGY"    value={energy}    ph={ph} bg={bg}/>
          </div>

          {/* Actions */}
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color: dim(0.5), borderBottom:`1px solid ${dim(0.15)}`, paddingBottom:4, marginBottom:8, letterSpacing:1 }}>[ ACTIONS ]</div>
            {[
              { label:'feed guppy',   action: feed,         hot: hunger < 35,    icon:'рҹҗҹ' },
              { label:'tap the glass', action: tap,          hot: happiness < 35, icon:'рҹ‘Ғ' },
              { label: sleeping ? 'turn lights on' : 'lights off', action: toggleLight, hot: energy < 25, icon: sleeping ? 'вҳҖ' : 'рҹҢҷ' },
            ].map(({ label, action, hot }) => (
              <div
                key={label}
                onClick={action}
                className="action-btn"
                style={{
                  cursor:'pointer', padding:'5px 8px', marginBottom:5,
                  color: hot ? '#ff9944' : ph,
                  border:`1px solid ${hot ? 'rgba(255,153,68,0.5)' : dim(0.18)}`,
                  fontSize:12, borderRadius:2,
                  display:'flex', justifyContent:'space-between', alignItems:'center',
                }}
              >
                <span>&gt; {label}</span>
                {hot && <span style={{ fontSize:10, color:'#ff9944', animation:'blink 0.8s infinite' }}>LOW</span>}
              </div>
            ))}
          </div>

          {/* Log */}
          <div style={{ flex:1, display:'flex', flexDirection:'column', minHeight:0 }}>
            <div style={{ fontSize:11, color: dim(0.5), borderBottom:`1px solid ${dim(0.15)}`, paddingBottom:4, marginBottom:8, letterSpacing:1, flexShrink:0 }}>[ LOG ]</div>
            <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:5 }}>
              {messages.slice(-30).map((m, i) => (
                <div key={i} style={{ fontSize:11, lineHeight:1.4, wordBreak:'break-word' }}>
                  <span style={{ color: m.from === 'guppy' ? dim(0.4) : rgba('#6ec6ff', 0.5) }}>
                    {m.from === 'guppy' ? 'guppy> ' : 'you>   '}
                  </span>
                  <span style={{ color: m.from === 'guppy' ? ph : '#6ec6ff' }}>{m.text}</span>
                </div>
              ))}
              {thinking && (
                <div style={{ fontSize:11, color: dim(0.4) }}>
                  guppy&gt; <span style={{ animation:'blink 0.7s infinite' }}>...</span>
                </div>
              )}
              <div ref={chatEndRef}/>
            </div>
          </div>
        </div>
      </div>

      {/* в”Җв”Җ INPUT */}
      <div style={{
        borderTop:`1px solid ${dim(0.18)}`,
        padding:'7px 12px',
        display:'flex', gap:10, alignItems:'center',
        flexShrink:0,
      }}>
        <span style={{ color: dim(0.45), fontSize:13 }}>you&gt;</span>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && send()}
          placeholder="say something to guppy..."
          style={{
            flex:1, background:'transparent', border:'none', outline:'none',
            color:'#6ec6ff', fontFamily:'inherit', fontSize:13,
            caretColor: ph,
          }}
        />
        <button onClick={send} disabled={thinking} style={{
          background:'transparent', border:`1px solid ${dim(0.25)}`,
          color: thinking ? dim(0.3) : ph,
          fontFamily:'inherit', fontSize:12,
          padding:'3px 12px', cursor: thinking ? 'default' : 'pointer',
          borderRadius:2,
        }}>
          {thinking ? 'В·В·В·' : 'SEND'}
        </button>
      </div>

      {/* Tweaks */}
      <TweaksPanel tw={tw} setTw={setTw} visible={tweaksVisible}/>
    </div>
  );
}

// в”Җв”Җ clock tick
setInterval(() => {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString();
}, 1000);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
