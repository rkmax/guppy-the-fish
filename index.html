<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GUPPY.EXE</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <!-- ONNX Runtime Web (runs GuppyLM locally via WebAssembly) -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
  <!-- GuppyLM engine: BPE tokenizer + ONNX inference -->
  <script src="guppy-engine.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050c07; }
    body { display: flex; align-items: center; justify-content: center; }
    #root { width: 100%; height: 100%; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    @keyframes scanline {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes zzzFloat {
      0%   { transform: translate(0, 0) scale(1); opacity: 0.8; }
      100% { transform: translate(6px, -14px) scale(1.3); opacity: 0; }
    }

    ::-webkit-scrollbar { width: 4px; background: #050c07; }
    ::-webkit-scrollbar-thumb { background: #143820; }
    input::placeholder { color: #1a4025; }

    .action-btn:hover { background: #0d2416 !important; }
    .action-btn:active { background: #122e1c !important; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "phosphorColor": "#39ff14",
  "bgColor": "#050c07",
  "scanlines": true,
  "binaryRain": true,
  "fishSize": 13
}/*EDITMODE-END*/;
</script>
<script src="app.js"></script>
</body>
</html>
